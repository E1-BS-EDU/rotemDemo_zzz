<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시스템 알림</title>
    <style>
        /* 1. 전체 화면 중앙 정렬을 위한 설정 */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex; /* 플렉스박스 사용 */
            justify-content: center; /* 가로 중앙 */
            align-items: center; /* 세로 중앙 */
            background-color: #f0f2f5; /* 연한 회색 배경 */
            font-family: 'Malgun Gothic', 'Noto Sans KR', sans-serif;
        }

        /* 2. 하얀색 카드 박스 디자인 */
        .message-box {
            background-color: #ffffff;
            padding: 50px 40px;
            border-radius: 15px; /* 둥근 모서리 */
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1); /* 그림자 효과 */
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        /* 3. 경고 아이콘 스타일 (SVG) */
        .icon-warning {
            width: 80px;
            height: 80px;
            fill: #e74c3c; /* 빨간색 (경고색) */
            margin-bottom: 20px;
            animation: bounce 2s infinite; /* 살짝 움직이는 효과 (선택사항) */
        }

        /* 4. 메인 문구 스타일 */
        h1 {
            font-size: 32px; /* 글자 크기 크게 */
            color: #333333;
            margin: 0 0 15px 0;
            font-weight: 800; /* 두껍게 */
        }

        /* 5. 보조 문구 스타일 */
        p {
            font-size: 16px;
            color: #666666;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        /* 6. 버튼 스타일 */
        .btn-home {
            display: inline-block;
            padding: 12px 30px;
            background-color: #34495e; /* 남색 */
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 16px;
            transition: background-color 0.3s;
        }
        .btn-home:hover {
            background-color: #2c3e50; /* 호버 시 색상 변경 */
        }

        /* 아이콘 애니메이션 정의 */
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }
    </style>
</head>
<body>

    <div class="message-box">
        <svg class="icon-warning" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
        </svg>

        <h1>시스템 관리자에게<br>문의하세요</h1>
        
        <p>
            접근 권한이 없거나, <br>
            일시적인 시스템 오류가 발생했습니다.
        </p>
       <!--
        <a href="/" th:href="@{/}" class="btn-home">메인으로 이동</a>
		-->
    </div>

</body>
</html>
