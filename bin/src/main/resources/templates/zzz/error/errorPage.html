<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Page Not Found</title>
    <style>
        /* 기본 초기화 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: #f4f6f8; /* 배경색: 옅은 회색 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* 화면 꽉 채우기 */
        }

        /* 흰색 카드 박스 */
        .error-container {
            background-color: #ffffff;
            width: 100%;
            max-width: 700px; /* 적당한 너비 */
            padding: 80px 40px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); /* 부드러운 그림자 */
            border-radius: 5px; /* 모서리 살짝 둥글게 */
        }

        /* 404 텍스트 디자인 */
        .error-code {
            font-size: 140px;
            font-weight: 900;
            color: #222;
            line-height: 1;
            margin-bottom: 20px;
            letter-spacing: -5px;
        }

        /* 가운데 0 파란색 포인트 */
        .error-code span {
            color: #00aeef; /* 이미지의 하늘색 */
        }

        /* 영문 메시지 */
        .msg-en {
            font-size: 14px;
            color: #444;
            text-transform: uppercase; /* 대문자 변환 */
            letter-spacing: 1px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        /* 한글 메시지 */
        .msg-kr {
            font-size: 16px;
            color: #666;
            margin-bottom: 40px;
            font-weight: normal;
        }

        /* 검색창 영역 */
        .search-wrap {
            position: relative;
            width: 300px;
            margin: 0 auto;
        }

        /* 검색 입력 필드 */
        .search-input {
            width: 100%;
            padding: 12px 20px;
            padding-right: 40px; /* 아이콘 공간 확보 */
            border: 1px solid #ddd;
            border-radius: 50px; /* 둥근 캡슐 모양 */
            outline: none;
            font-size: 14px;
            color: #666;
            transition: border-color 0.3s;
        }

        .search-input:focus {
            border-color: #00aeef;
        }

        .search-input::placeholder {
            color: #aaa;
        }

        /* 검색 아이콘 (SVG 사용) */
        .search-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #aaa;
            padding: 0;
            display: flex;
            align-items: center;
        }
        
        .search-btn svg {
            width: 16px;
            height: 16px;
            fill: #999;
        }

    </style>
</head>
<body>

    <div class="error-container">
        <h1 class="error-code">
            <th:block th:if="${errorCode == '404'}">
                4<span>0</span>4
            </th:block>
            <th:block th:unless="${errorCode == '404'}">
                <span th:text="${errorCode}">500</span>
            </th:block>
        </h1>
		<!--
        <p class="msg-en">THE PAGE YOU REQUESTED COULD NOT BE FOUND</p>
		-->
        <p class="msg-kr" th:text="${errorMessage != null ? errorMessage : '요청한 페이지를 찾을 수 없습니다.'}">
            요청한 페이지를 찾을 수 없습니다.
        </p>
    </div>

</body>
</html>
